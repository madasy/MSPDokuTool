# MSP DokuTool — Full Stack with ZITADEL v4

services:
  # ── App Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mspdoku-postgres
    environment:
      POSTGRES_DB: mspdoku
      POSTGRES_USER: mspuser
      POSTGRES_PASSWORD: msppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mspuser -d mspdoku" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ZITADEL (Identity Provider) ───────────────────────────
  # Uses Traefik to route: /ui/v2/login → login container, everything else → API
  zitadel-db:
    image: postgres:17-alpine
    container_name: mspdoku-zitadel-db
    environment:
      POSTGRES_DB: zitadel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zitadel_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d zitadel -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zitadel

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    container_name: mspdoku-zitadel-api
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: "Automatically Initialized IAM_LOGIN_CLIENT"
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "http://localhost:8085/ui/v2/login/"
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "http://localhost:8085/ui/v2/login/login?authRequest="
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "http://localhost:8085/ui/v2/login/logout?post_logout_redirect="
      ZITADEL_SAML_DEFAULTLOGINURLV2: "http://localhost:8085/ui/v2/login/login?samlRequest="
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:rw
    networks:
      - zitadel
    depends_on:
      zitadel-db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      # API routes (stripped /api prefix)
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes=/api
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.forceSlash=false
      - traefik.http.routers.zitadel-api-alias.rule=Host(`localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias.entrypoints=web
      - traefik.http.routers.zitadel-api-alias.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias.priority=200
      # Everything else (console, OIDC, etc.)
      - traefik.http.routers.zitadel-canonical.rule=Host(`localhost`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical.entrypoints=web
      - traefik.http.routers.zitadel-canonical.service=zitadel-api
      - traefik.http.routers.zitadel-canonical.priority=100

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.11.0
    container_name: mspdoku-zitadel-login
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: "Host:localhost,X-Forwarded-Proto:http"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -qO- http://localhost:3000/ui/v2/login/healthy || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:ro
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      # Root redirect
      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/
      - traefik.http.routers.zitadel-root.rule=Host(`localhost`) && Path(`/`)
      - traefik.http.routers.zitadel-root.entrypoints=web
      - traefik.http.routers.zitadel-root.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root.service=zitadel-login
      - traefik.http.routers.zitadel-root.priority=400
      # Login UI
      - traefik.http.routers.zitadel-login.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login.entrypoints=web
      - traefik.http.routers.zitadel-login.service=zitadel-login
      - traefik.http.routers.zitadel-login.priority=250

  zitadel-proxy:
    image: traefik:v3.6.8
    container_name: mspdoku-zitadel-proxy
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=zitadel
      - --entrypoints.web.address=:80
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=WARN
    ports:
      - "8085:80"
    networks:
      - zitadel
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy

  # ── App Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mspdoku-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mspdoku
      SPRING_DATASOURCE_USERNAME: mspuser
      SPRING_DATASOURCE_PASSWORD: msppassword
      ZITADEL_ISSUER: http://localhost:8085
    depends_on:
      postgres:
        condition: service_healthy

  # ── App Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mspdoku-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  zitadel:
    name: zitadel

volumes:
  postgres_data:
  zitadel_data:
  zitadel_bootstrap:
