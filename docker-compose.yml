services:
  postgres:
    image: postgres:16-alpine
    container_name: mspdoku-postgres
    environment:
      POSTGRES_DB: mspdoku
      POSTGRES_USER: mspuser
      POSTGRES_PASSWORD: msppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mspuser -d mspdoku" ]
      interval: 5s
      timeout: 5s
      retries: 5

  authelia:
    image: authelia/authelia:latest
    container_name: mspdoku-authelia
    volumes:
      - ./authelia:/config
      - ./certs:/certs:ro
    environment:
      TZ: Europe/Zurich
    expose:
      - "9091"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mspdoku-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mspdoku
      SPRING_DATASOURCE_USERNAME: mspuser
      SPRING_DATASOURCE_PASSWORD: msppassword
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mspdoku-frontend
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - authelia

volumes:
  postgres_data:
