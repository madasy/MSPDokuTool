---
# Authelia Configuration for MSP DokuTool
# For production: replace secrets and use trusted certificates

server:
  address: 'tcp://:9091'

log:
  level: info

totp:
  issuer: 'MSP DokuTool'

identity_validation:
  reset_password:
    jwt_secret: 'mspdoku_jwt_secret_change_in_production_1234567890'

authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: bcrypt

session:
  secret: 'mspdoku_session_secret_change_in_production_1234'
  cookies:
    - domain: '127.0.0.1'
      authelia_url: 'https://127.0.0.1:3443/.authelia'
      default_redirection_url: 'https://127.0.0.1:3443'
      name: 'authelia_session'
      same_site: 'lax'
      inactivity: '5m'
      expiration: '1h'

storage:
  encryption_key: 'mspdoku_storage_encryption_key_change_in_prod_1234'
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

# Access control:
# - Admins and technicians: password only (one_factor)
# - Tenant customer users: password + TOTP (two_factor)
#
# How it works: default_policy is one_factor so everyone can log in
# with just a password. Then subject-based rules UPGRADE tenant users
# to require two_factor on their next request after first-factor auth.
access_control:
  default_policy: one_factor
  rules:
    # Admins — explicitly one_factor (matches first, stops evaluation)
    - domain: '127.0.0.1'
      subject:
        - ['group:admins']
      policy: one_factor

    # Technicians — explicitly one_factor
    - domain: '127.0.0.1'
      subject:
        - ['group:technicians']
      policy: one_factor

    # Tenant customer users — must complete 2FA after password login
    # All tenant users get the 'tenant_users' group when created
    - domain: '127.0.0.1'
      subject:
        - ['group:tenant_users']
      policy: two_factor
