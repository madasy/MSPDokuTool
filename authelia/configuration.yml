---
# =============================================================================
# Authelia Configuration for MSP DokuTool
# =============================================================================
# Dev/Testing config. For production: replace all secrets, use real certs,
# switch notifier to SMTP.

server:
  address: 'tcp://:9091'

log:
  level: debug  # Use 'info' in production

# --- TOTP ---
totp:
  issuer: 'MSP DokuTool'
  allowed_algorithms:
    - SHA1
  allowed_digits:
    - 6
  allowed_periods:
    - 30

# --- Identity Validation ---
# Controls how identity verification tokens work (for TOTP enrollment etc.)
# In dev with filesystem notifier: tokens are written to notification.txt
identity_validation:
  reset_password:
    jwt_secret: 'mspdoku_jwt_secret_change_in_production_1234567890'

# --- Authentication Backend ---
authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: bcrypt

# --- Session ---
session:
  secret: 'mspdoku_session_secret_change_in_production_1234'
  cookies:
    - domain: '127.0.0.1'
      authelia_url: 'https://127.0.0.1:3443/.authelia'
      default_redirection_url: 'https://127.0.0.1:3443'
      name: 'authelia_session'
      same_site: 'lax'
      inactivity: '10m'
      expiration: '8h'

# --- Storage ---
storage:
  encryption_key: 'mspdoku_storage_encryption_key_change_in_prod_1234'
  local:
    path: /config/db.sqlite3

# --- Notifier ---
# DEVELOPMENT: writes to file — check notification.txt for TOTP enrollment links
# PRODUCTION: switch to SMTP block below
notifier:
  filesystem:
    filename: /config/notification.txt
  # smtp:
  #   address: 'submissions://smtp.example.com:587'
  #   username: 'authelia@example.com'
  #   password: 'smtp-password'
  #   sender: 'MSP DokuTool <noreply@example.com>'

# =============================================================================
# Access Control
# =============================================================================
#
# HOW IT WORKS:
# 1. Rules are evaluated top-to-bottom. First matching rule wins.
# 2. 'subject' rules only match AFTER the user has completed first-factor.
# 3. For anonymous users, subject rules are skipped → falls to default_policy.
# 4. default_policy: one_factor → anonymous users are asked for password only.
#
# IMPORTANT: The Authelia portal UI determines what to show (password-only vs
# password+TOTP) based on the 'X-Original-URL' in the auth_request. When admin
# logs in, the verify endpoint is called with the redirect target URL. If that
# URL's matching rule requires only one_factor for the admin's group, Authelia
# returns 200 (authorized) and the portal redirects to the app without showing
# the TOTP page.
#
# The key insight: rules with 'subject' filters are ONLY evaluated for
# authenticated users. For anonymous requests, only non-subject rules match.
#
access_control:
  default_policy: one_factor

  rules:
    # -------------------------------------------------------------------------
    # Rule 1: Tenant customer users → two_factor
    # Matches users in group 'tenant_users'. After first-factor, Authelia sees
    # the user is in tenant_users and requires second factor.
    # -------------------------------------------------------------------------
    - domain: '127.0.0.1'
      subject:
        - ['group:tenant_users']
      policy: two_factor

    # -------------------------------------------------------------------------
    # Everything else falls through to default_policy: one_factor
    # Admins and technicians don't match the tenant_users rule, so they get
    # one_factor (password only) from the default policy.
    # -------------------------------------------------------------------------
