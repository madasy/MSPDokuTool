# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host:3443$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;
    set $upstream_authelia http://authelia:9091;

    # Internal Authelia verification subrequest
    location = /authelia-verify {
        internal;
        proxy_pass $upstream_authelia/api/verify;

        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_pass_request_body off;

        # Must send the original URL with https scheme (not internal http)
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # Authelia portal — login UI proxied through nginx
    location /.authelia/ {
        proxy_pass $upstream_authelia/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Authelia static assets (loaded via <base href="/"> from the portal)
    location /static/ {
        proxy_pass http://authelia:9091;
    }
    location = /manifest.json {
        proxy_pass http://authelia:9091;
    }
    location = /favicon.ico {
        proxy_pass http://authelia:9091;
    }
    location /locales/ {
        proxy_pass http://authelia:9091;
    }

    # Static assets — NO auth, serve directly (Vite puts them in /assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon and other root static files — NO auth
    location = /favicon.svg {
        expires 1y;
    }
    location = /vite.svg {
        expires 1y;
    }

    # Authelia API endpoints (login, logout, state, TOTP etc.)
    location /api/firstfactor {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
    location /api/secondfactor {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
    location /api/state {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
    location /api/configuration {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
    location /api/logout {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
    }
    location /api/verify {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
    location /api/health {
        proxy_pass $upstream_authelia;
    }
    location /api/user {
        proxy_pass $upstream_authelia;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
    }

    # App API requests — protected by Authelia, user headers forwarded to backend
    location /api/v1/ {
        auth_request /authelia-verify;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;

        error_page 401 =302 https://$http_host/.authelia/#/?rd=$scheme://$http_host$request_uri;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Remote-User $user;
        proxy_set_header Remote-Groups $groups;
        proxy_set_header Remote-Name $name;
        proxy_set_header Remote-Email $email;
    }

    # SPA catch-all — protected by Authelia
    # Only HTML pages need auth; JS/CSS already served above without auth
    location / {
        auth_request /authelia-verify;
        error_page 401 =302 https://$http_host/.authelia/#/?rd=$scheme://$http_host$request_uri;
        try_files $uri $uri/ /index.html;
    }
}
