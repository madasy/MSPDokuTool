spring.application.name=backend

# Database Configuration (Defaults for local run, overridden by ENV in Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mspdoku}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mspuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:msppassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Security
management.endpoints.web.exposure.include=health,info

# JWT Configuration
jwt.secret=${JWT_SECRET:mspdoku-dev-secret-must-be-at-least-32-characters-long}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

spring.jpa.open-in-view=false
